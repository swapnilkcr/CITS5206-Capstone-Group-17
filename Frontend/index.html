<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pump Failure Detection</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark shadow-sm">
    <div class="container">
      <span class="navbar-brand mb-0 h1">Pump Failure Detection</span>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-4">
      
      <div class="col-lg-5">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h3 class="card-title mb-3">Upload Dataset</h3>

            <div class="mb-3">
              <label for="datasetFile" class="form-label">CSV File</label>
              <input class="form-control" type="file" id="datasetFile" accept=".csv" />
            </div>

            <div class="mb-3">
              <label for="algorithm" class="form-label">Choose Algorithm</label>
              <select class="form-select" id="algorithm">
                <option value="if">Isolation Forest</option>
                <option value="ecod">ECOD</option>
                <option value="transformer">Anomaly Transformer</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="sequenceLength" class="form-label">Sequence Length</label>
              <input type="number" class="form-control" id="sequenceLength" value="30" min="1" />
            </div>

            <button class="btn btn-dark w-100" id="predictBtn">Predict</button>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card shadow-sm border-0">
          <div class="card-body">
            <h3 class="card-title mb-3">Prediction Result</h3>

            <div id="resultSection" class="d-none">
              <div class="alert alert-info" id="predictionText">
                Waiting for prediction...
              </div>

              <div class="row g-3 mb-3">
                <div class="col-md-4">
                  <div class="p-3 bg-light rounded border">
                    <small class="text-muted">Algorithm</small>
                    <div class="fw-bold" id="resultAlgorithm">-</div>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="p-3 bg-light rounded border">
                    <small class="text-muted">Uploaded File</small>
                    <div class="fw-bold" id="resultFile">-</div>
                  </div>
                </div>
                <div class="col-md-4">
                  <div class="p-3 bg-light rounded border">
                    <small class="text-muted">Anomaly Ratio</small>
                    <div class="fw-bold" id="resultRatio">-</div>
                  </div>
                </div>
              </div>

              <h5>Window Results</h5>
              <div class="table-responsive">
                <table class="table table-bordered table-striped">
                  <thead class="table-light">
                    <tr>
                      <th>Window</th>
                      <th>Score</th>
                      <th>Prediction</th>
                    </tr>
                  </thead>
                  <tbody id="resultsTableBody"></tbody>
                </table>
              </div>
            </div>

            <div id="emptyState" class="text-muted">
              Upload a dataset and click predict to see the result.
            </div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
